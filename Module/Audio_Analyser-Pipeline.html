<style>
    .module-wrapper {
        display: flex;
        flex-direction: column;
        gap: 15px;
        height: 100%;
        font-family: 'Courier New', Courier, monospace;
        color: #c9d1d9;
    }

    .module-header {
        border-bottom: 1px solid #30363d;
        padding-bottom: 8px;
    }

    .module-header h3 {
        color: #00ffcc;
        margin: 0 0 5px 0;
        font-size: 1.1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    /* Hardware-Locked Resolution Container */
    .vis-container {
        width: 100%;
        height: 380px;
        background-color: #05070a;
        border: 1px solid #30363d;
        border-radius: 4px;
        position: relative;
        overflow: hidden;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
        cursor: pointer;
    }

    .vis-container:fullscreen {
        height: 100vh;
        border: none;
        border-radius: 0;
    }

    canvas {
        display: block;
        width: 100%;
        height: 100%;
    }

    /* Steuerungskonsole Split-Layout */
    .interface-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }

    @media (max-width: 768px) {
        .interface-grid { grid-template-columns: 1fr; }
    }

    .control-panel, .playlist-panel {
        background-color: #161b22;
        padding: 15px;
        border: 1px solid #30363d;
        border-radius: 4px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .control-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .slider-container {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-top: 2px;
    }

    .slider-title-row {
        display: flex;
        justify-content: space-between;
        font-size: 0.8rem;
    }

    label, .slider-title-row span {
        color: #ffd700;
        text-transform: uppercase;
    }

    .slider-title-row .val-indicator {
        color: #00ffcc;
        font-weight: bold;
    }

    select, input[type="file"] {
        background-color: #0d1117;
        border: 1px solid #30363d;
        color: #c9d1d9;
        padding: 8px;
        font-family: inherit;
        font-size: 0.85rem;
    }

    input[type="range"] {
        accent-color: #00ffcc;
        background: #0d1117;
        height: 6px;
        border-radius: 3px;
        outline: none;
    }

    #slider-volume {
        accent-color: #ff00ff;
    }

    .playback-buttons {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
    }

    .btn-system {
        padding: 8px;
        background-color: transparent;
        border: 1px solid #00ffcc;
        color: #00ffcc;
        cursor: pointer;
        font-weight: bold;
        text-transform: uppercase;
        font-family: inherit;
        font-size: 0.8rem;
        text-align: center;
    }

    .btn-system:hover {
        background-color: #00ffcc;
        color: #0d1117;
    }

    .playlist-scroll {
        flex: 1;
        min-height: 120px;
        max-height: 220px;
        background-color: #0d1117;
        border: 1px solid #30363d;
        overflow-y: auto;
    }

    .track-item {
        padding: 8px;
        border-bottom: 1px solid #161b22;
        font-size: 0.8rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
    }

    .track-item:hover { background-color: #1f242c; }
    
    .track-item.playing {
        border-left: 3px solid #ff00ff;
        background-color: #161b22;
        color: #ff00ff;
        font-weight: bold;
    }

    .track-name {
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
    }

    .btn-remove {
        color: #ff7b72;
        cursor: pointer;
        padding: 2px 6px;
        font-weight: bold;
        transition: color 0.1s;
    }

    .btn-remove:hover {
        color: #ff0000;
        background-color: rgba(255, 123, 114, 0.1);
    }

    .status-hud {
        font-size: 0.8rem;
        color: #ffd700;
        text-align: center;
        min-height: 15px;
    }

    .fullscreen-hint {
        position: absolute;
        top: 15px;
        left: 15px;
        background-color: rgba(13, 17, 23, 0.8);
        border: 1px solid #30363d;
        padding: 6px 12px;
        font-size: 0.75rem;
        color: #00ffcc;
        pointer-events: none;
        display: none;
    }

    .vis-container:fullscreen .fullscreen-hint { display: block; }
</style>

<div class="module-wrapper">
    <div class="module-header">
        <h3>Acoustic Resonance Engine V2.5</h3>
        <span style="font-size: 0.75rem; color: #8b949e;">Adaptive Resolution Core & Hardware Linear Gain Control</span>
    </div>

    <audio id="audio-player" crossorigin="anonymous" style="display: none;"></audio>

    <div class="vis-container" id="vis-container" title="Doppelklick für Vollbild">
        <canvas id="vis-canvas"></canvas>
        <div class="fullscreen-hint" data-mi18n="fs_hint">Vollbild-Modus aktiv. Maus bewegen oder wischen zum Beenden.</div>
    </div>

    <div class="interface-grid">
        <div class="control-panel">
            <div class="control-group">
                <label data-mi18n="vis_style">Visualisierungs-Stil</label>
                <select id="vis-style">
                    <option value="bars" data-mi18n="opt_bars">Cyberpunk Matrix (Symmetrische Balken)</option>
                    <option value="orbit" selected data-mi18n="opt_orbit">Orbit Resonance (Kreis-Mandala)</option>
                    <option value="nebula" data-mi18n="opt_nebula">Kinetic Particle Nebula (Teilchenfeld)</option>
                    <option value="wave" data-mi18n="opt_wave">Quantum Wave (Frequenz-Oszillator)</option>
                    <option value="blocks" data-mi18n="opt_blocks">Retro LED Matrix (Block-Equalizer)</option>
                    <option value="nova" data-mi18n="opt_nova">Supernova (Radiale Spektren)</option>
                </select>
            </div>

            <div class="control-group">
                <label data-mi18n="loop_mode">Schleifen-Modus (Loop)</label>
                <select id="loop-mode">
                    <option value="none" data-mi18n="opt_loop_none">Lineare Playlist (Kein Loop)</option>
                    <option value="track" data-mi18n="opt_loop_track">Aktuellen Titel wiederholen (Loop 1)</option>
                    <option value="playlist" data-mi18n="opt_loop_all">Ganze Playlist wiederholen (Loop All)</option>
                </select>
            </div>

            <div class="control-group">
                <label data-mi18n="sig_ctrl">Signalsteuerung</label>
                <div class="playback-buttons">
                    <button class="btn-system" id="btn-prev" data-mi18n="btn_prev">⏮ Zurück</button>
                    <button class="btn-system" id="btn-play" data-mi18n="btn_play">▶ Play</button>
                    <button class="btn-system" id="btn-next" data-mi18n="btn_next">⏭ Vor</button>
                </div>
            </div>
            
            <div class="control-group">
                <div class="slider-container">
                    <div class="slider-title-row">
                        <span data-mi18n="lbl_vol">Lautstärke (Volume)</span>
                        <span class="val-indicator" id="val-volume">80%</span>
                    </div>
                    <input type="range" id="slider-volume" min="0" max="1" step="0.01" value="0.80">
                </div>

                <div class="slider-container" style="margin-top: 5px;">
                    <div class="slider-title-row">
                        <span data-mi18n="lbl_gain">Sensitivität (Gain)</span>
                        <span class="val-indicator" id="val-gain">2.5x</span>
                    </div>
                    <input type="range" id="slider-gain" min="1" max="5" step="0.1" value="2.5">
                </div>
            </div>
        </div>

        <div class="playlist-panel">
            <div class="control-group">
                <label data-mi18n="lbl_files">Audio-Dateien einspeisen (Mehrfachauswahl möglich)</label>
                <input type="file" id="file-bulk" accept="audio/*" multiple>
            </div>

            <label data-mi18n="lbl_queue">Aktuelle Sequenz-Warteschlange</label>
            <div class="playlist-scroll" id="playlist-box"></div>
        </div>
    </div>
    
    <div class="status-hud" id="hud-status" data-mi18n="hud_offline">Audio-Pipeline offline. Bitte Titel laden.</div>
</div>

<script>
    const root = typeof shadowRoot !== 'undefined' ? shadowRoot : document;

    // ==========================================
    // 1. MODUL-LOKALE i18n ÜBERSETZUNGS-ENGINGE
    // ==========================================
    const mod_i18n = {
        lang: localStorage.getItem('arte_lang_pref') || 'de',
        
        dict: {
            de: {
                fs_hint: "Vollbild-Modus aktiv. Maus bewegen oder wischen zum Beenden.",
                vis_style: "Visualisierungs-Stil", opt_bars: "Cyberpunk Matrix (Symmetrische Balken)", opt_orbit: "Orbit Resonance (Kreis-Mandala)", 
                opt_nebula: "Kinetic Particle Nebula (Teilchenfeld)", opt_wave: "Quantum Wave (Frequenz-Oszillator)", 
                opt_blocks: "Retro LED Matrix (Block-Equalizer)", opt_nova: "Supernova (Radiale Spektren)",
                loop_mode: "Schleifen-Modus (Loop)", opt_loop_none: "Lineare Playlist (Kein Loop)", 
                opt_loop_track: "Aktuellen Titel wiederholen (Loop 1)", opt_loop_all: "Ganze Playlist wiederholen (Loop All)",
                sig_ctrl: "Signalsteuerung", btn_prev: "⏮ Zurück", btn_play: "▶ Play", btn_pause: "⏸ Pause", btn_next: "⏭ Vor",
                lbl_vol: "Lautstärke (Volume)", lbl_gain: "Sensitivität (Gain)", 
                lbl_files: "Audio-Dateien einspeisen (Mehrfachauswahl möglich)", lbl_queue: "Aktuelle Sequenz-Warteschlange",
                hud_offline: "Audio-Pipeline offline. Bitte Titel laden.",
                
                // Dynamische JS Strings
                q_empty: "[Warteschlange leer]", hud_rem: "ENTFERNT:", hud_stop: "Wiedergabe gestoppt.",
                hud_run: "LÄUFT:", hud_wait: "Bereit:", hud_man: "Drücke manuell PLAY.",
                sys_err: "System-Fehler:", hud_init: "Titel eingereiht. Initialisiere...", hud_end: "Playlist beendet."
            },
            en: {
                fs_hint: "Fullscreen mode active. Move mouse or swipe to exit.",
                vis_style: "Visualization Style", opt_bars: "Cyberpunk Matrix (Symmetric Bars)", opt_orbit: "Orbit Resonance (Circle Mandala)", 
                opt_nebula: "Kinetic Particle Nebula (Particle Field)", opt_wave: "Quantum Wave (Frequency Oscillator)", 
                opt_blocks: "Retro LED Matrix (Block Equalizer)", opt_nova: "Supernova (Radial Spectra)",
                loop_mode: "Loop Mode", opt_loop_none: "Linear Playlist (No Loop)", 
                opt_loop_track: "Repeat Current Track (Loop 1)", opt_loop_all: "Repeat Entire Playlist (Loop All)",
                sig_ctrl: "Signal Control", btn_prev: "⏮ Prev", btn_play: "▶ Play", btn_pause: "⏸ Pause", btn_next: "⏭ Next",
                lbl_vol: "Volume", lbl_gain: "Sensitivity (Gain)", 
                lbl_files: "Inject Audio Files (Multiple Selection)", lbl_queue: "Current Sequence Queue",
                hud_offline: "Audio pipeline offline. Please load tracks.",
                
                // Dynamische JS Strings
                q_empty: "[Queue empty]", hud_rem: "REMOVED:", hud_stop: "Playback stopped.",
                hud_run: "PLAYING:", hud_wait: "Ready:", hud_man: "Press PLAY manually.",
                sys_err: "System Error:", hud_init: "tracks queued. Initializing...", hud_end: "Playlist finished."
            }
        },

        t: function(key) { return this.dict[this.lang][key] || key; },

        updateUI: function() {
            root.querySelectorAll('[data-mi18n]').forEach(el => {
                el.innerHTML = this.t(el.getAttribute('data-mi18n'));
            });
            // Update Play/Pause Button live based on audio state
            const btnPlayNode = root.getElementById('btn-play');
            if (btnPlayNode) {
                if (audioPlayer && !audioPlayer.paused) btnPlayNode.textContent = this.t('btn_pause');
                else btnPlayNode.textContent = this.t('btn_play');
            }
        }
    };

    // OS-Antenne einhängen
    if (window.osBus) {
        window.osBus.on('lang-changed', (newLang) => {
            mod_i18n.lang = newLang;
            mod_i18n.updateUI();
            updatePlaylistUI(); // Zwingt die Liste zum Neuzeichnen
        });
    }
    
    setTimeout(() => { mod_i18n.updateUI(); }, 50);

    // ==========================================
    // 2. ORIGINAL MODUL LOGIK
    // ==========================================
    const container = root.getElementById('vis-container');
    const canvas = root.getElementById('vis-canvas');
    const ctx = canvas.getContext('2d');
    
    const fileBulk = root.getElementById('file-bulk');
    const playlistBox = root.getElementById('playlist-box');
    const visStyle = root.getElementById('vis-style');
    const loopMode = root.getElementById('loop-mode');
    
    const sliderVolume = root.getElementById('slider-volume');
    const valVolume = root.getElementById('val-volume');
    const sliderGain = root.getElementById('slider-gain');
    const valGain = root.getElementById('val-gain');
    
    const hudStatus = root.getElementById('hud-status');
    const btnPlay = root.getElementById('btn-play');
    const btnPrev = root.getElementById('btn-prev');
    const btnNext = root.getElementById('btn-next');
    const audioPlayer = root.getElementById('audio-player'); 
    
    let audioCtx = null;
    let analyser = null;
    let audioSource = null;
    let dataArray = [];
    let bufferLength = 0;
    let isContextInitialized = false;

    let playlist = [];
    let currentTrackIndex = -1;
    let isFullscreenCooldown = false;

    const particles = [];
    const NUM_PARTICLES = 120;
    for (let i = 0; i < NUM_PARTICLES; i++) {
        particles.push({
            x: Math.random(), y: Math.random(), radius: Math.random() * 3 + 1,
            baseSpeedX: (Math.random() - 0.5) * 0.5, baseSpeedY: (Math.random() - 0.5) * 0.5,
            color: Math.random() > 0.5 ? '#00ffcc' : '#ff00ff'
        });
    }
    let peaks = [];

    audioPlayer.volume = parseFloat(sliderVolume.value);

    const resizeObserver = new ResizeObserver(entries => {
        for (let entry of entries) {
            canvas.width = entry.contentRect.width;
            canvas.height = entry.contentRect.height;
        }
    });
    resizeObserver.observe(container);

    sliderVolume.addEventListener('input', (e) => {
        const vol = parseFloat(e.target.value);
        audioPlayer.volume = vol;
        valVolume.textContent = Math.round(vol * 100) + '%';
    });

    sliderGain.addEventListener('input', (e) => {
        valGain.textContent = parseFloat(e.target.value).toFixed(1) + 'x';
    });

    function updatePlaylistUI() {
        playlistBox.innerHTML = '';
        if (playlist.length === 0) {
            playlistBox.innerHTML = `<div style="color:#8b949e;text-align:center;padding:20px;font-size:0.8rem;">${mod_i18n.t('q_empty')}</div>`;
            return;
        }

        playlist.forEach((track, index) => {
            const item = document.createElement('div');
            item.className = `track-item ${index === currentTrackIndex ? 'playing' : ''}`;
            
            const nameSpan = document.createElement('div');
            nameSpan.className = 'track-name';
            nameSpan.textContent = `${index + 1}. ${track.name}`;
            nameSpan.addEventListener('click', () => executeTrackRouting(index));
            
            const removeBtn = document.createElement('div');
            removeBtn.className = 'btn-remove';
            removeBtn.textContent = '✖';
            removeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                removeTrackFromSequence(index);
            });

            item.appendChild(nameSpan);
            item.appendChild(removeBtn);
            playlistBox.appendChild(item);
        });
    }

    function removeTrackFromSequence(index) {
        if (index < 0 || index >= playlist.length) return;
        
        URL.revokeObjectURL(playlist[index].url);
        const removedName = playlist[index].name;
        playlist.splice(index, 1);

        if (currentTrackIndex === index) {
            audioPlayer.pause();
            audioPlayer.src = '';
            currentTrackIndex = -1;
            btnPlay.textContent = mod_i18n.t('btn_play');
            hudStatus.textContent = `${mod_i18n.t('hud_rem')} ${removedName}. ${mod_i18n.t('hud_stop')}`;
            hudStatus.style.color = '#ffd700';
        } else if (currentTrackIndex > index) {
            currentTrackIndex--;
        }

        updatePlaylistUI();
        if (window.osBus) window.osBus.emit('log', { msg: `Titel '${removedName}' aus Playlist eliminiert.` });
    }

    function executeTrackRouting(index) {
        try {
            if (index < 0 || index >= playlist.length) return;
            currentTrackIndex = index;
            
            if (!isContextInitialized) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 512;
                bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                peaks = new Array(bufferLength).fill(0);

                audioSource = audioCtx.createMediaElementSource(audioPlayer);
                audioSource.connect(analyser);
                analyser.connect(audioCtx.destination);
                isContextInitialized = true;
            }
            
            audioPlayer.src = playlist[index].url;
            audioPlayer.load();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            updatePlaylistUI();

            const playPromise = audioPlayer.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    hudStatus.textContent = `${mod_i18n.t('hud_run')} ${playlist[index].name}`;
                    hudStatus.style.color = '#00ffcc';
                }).catch(err => {
                    console.warn('Autoplay blockiert:', err);
                    hudStatus.textContent = `${mod_i18n.t('hud_wait')} ${playlist[index].name}. ${mod_i18n.t('hud_man')}`;
                    hudStatus.style.color = '#ffd700';
                });
            }
        } catch (err) {
            console.error('Routing Error:', err);
            hudStatus.textContent = `${mod_i18n.t('sys_err')} ${err.message}`;
            hudStatus.style.color = '#ff7b72';
        }
    }

    fileBulk.addEventListener('change', (e) => {
        try {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            files.forEach(file => {
                playlist.push({ name: file.name, url: URL.createObjectURL(file) });
            });

            updatePlaylistUI();
            
            // Text Logik für i18n
            if (mod_i18n.lang === 'de') {
                hudStatus.textContent = `${files.length} Titel eingereiht. Initialisiere...`;
            } else {
                hudStatus.textContent = `${files.length} ${mod_i18n.t('hud_init')}`;
            }
            hudStatus.style.color = '#ffd700';

            setTimeout(() => {
                if (currentTrackIndex === -1 && playlist.length > 0) executeTrackRouting(0);
            }, 150);

            e.target.value = '';
        } catch (err) {
            hudStatus.textContent = `${mod_i18n.t('sys_err')} ${err.message}`;
            hudStatus.style.color = '#ff7b72';
        }
    });

    audioPlayer.addEventListener('play', () => {
        btnPlay.textContent = mod_i18n.t('btn_pause');
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    });

    audioPlayer.addEventListener('pause', () => {
        btnPlay.textContent = mod_i18n.t('btn_play');
    });

    audioPlayer.addEventListener('ended', () => {
        const mode = loopMode.value;
        if (mode === 'track') {
            audioPlayer.currentTime = 0;
            audioPlayer.play();
        } else if (mode === 'playlist') {
            const nextIndex = (currentTrackIndex + 1) % playlist.length;
            executeTrackRouting(nextIndex);
        } else {
            if (currentTrackIndex < playlist.length - 1) {
                executeTrackRouting(currentTrackIndex + 1);
            } else {
                hudStatus.textContent = mod_i18n.t('hud_end');
                hudStatus.style.color = '#ffd700';
            }
        }
    });

    btnPlay.addEventListener('click', () => {
        if (currentTrackIndex === -1 && playlist.length > 0) {
            executeTrackRouting(0); return;
        }
        if (audioPlayer.paused) audioPlayer.play();
        else audioPlayer.pause();
    });

    btnNext.addEventListener('click', () => {
        if (playlist.length === 0) return;
        const nextIndex = (currentTrackIndex + 1) % playlist.length;
        executeTrackRouting(nextIndex);
    });

    btnPrev.addEventListener('click', () => {
        if (playlist.length === 0) return;
        let prevIndex = currentTrackIndex - 1;
        if (prevIndex < 0) prevIndex = playlist.length - 1;
        executeTrackRouting(prevIndex);
    });

    container.addEventListener('dblclick', () => {
        if (!document.fullscreenElement) {
            container.requestFullscreen().then(() => {
                isFullscreenCooldown = true;
                setTimeout(() => { isFullscreenCooldown = false; }, 800);
            }).catch(err => console.error(err));
        } else {
            document.exitFullscreen();
        }
    });

    document.addEventListener('fullscreenchange', () => { resizeCanvas(); });

    const triggerKinetikExit = () => {
        if (document.fullscreenElement && !isFullscreenCooldown) {
            document.exitFullscreen();
        }
    };
    container.addEventListener('mousemove', triggerKinetikExit);
    container.addEventListener('touchmove', triggerKinetikExit, { passive: true });

    function renderPipeline() {
        requestAnimationFrame(renderPipeline);
        const w = canvas.width;
        const h = canvas.height;
        const centerX = w / 2;
        const centerY = h / 2;

        ctx.fillStyle = '#05070a';
        ctx.fillRect(0, 0, w, h);

        if (!isContextInitialized) {
            ctx.strokeStyle = '#222831';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(0, centerY);
            for(let i=0; i<w; i++) {
                ctx.lineTo(i, centerY + Math.sin(i * 0.015 + Date.now() * 0.003) * 8);
            }
            ctx.stroke();
            return;
        }

        analyser.getByteFrequencyData(dataArray);
        const gain = parseFloat(sliderGain.value);
        const currentStyle = visStyle.value;

        if (currentStyle === 'bars') {
            const barWidth = (w / bufferLength) * 1.5;
            let x = 0;
            for (let i = 0; i < bufferLength; i++) {
                let val = dataArray[i] * gain * 1.2;
                if (val > h * 0.95) val = h * 0.95;
                if (val > peaks[i]) peaks[i] = val;
                else peaks[i] -= 2.0;

                const ratio = i / bufferLength;
                ctx.fillStyle = `rgb(${Math.floor(ratio * 255)}, ${Math.floor((1 - ratio) * 255)}, 204)`;
                ctx.fillRect(centerX + x, h - val, barWidth - 2, val);
                ctx.fillRect(centerX - x - barWidth, h - val, barWidth - 2, val);
                ctx.fillStyle = '#ffd700';
                ctx.fillRect(centerX + x, h - peaks[i] - 3, barWidth - 2, 2);
                ctx.fillRect(centerX - x - barWidth, h - peaks[i] - 3, barWidth - 2, 2);
                x += barWidth;
                if (centerX + x > w) break;
            }
        }
        else if (currentStyle === 'orbit') {
            let bassSum = 0;
            for (let i = 0; i < 15; i++) bassSum += dataArray[i];
            const baseRadius = Math.min(w, h) * 0.22 + ((bassSum / 15) * gain * 0.25);
            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';
            
            ctx.strokeStyle = '#ff00ff';
            ctx.beginPath();
            for (let i = 0; i < bufferLength; i++) {
                const angle = (i / bufferLength) * Math.PI * 2;
                const r = baseRadius + dataArray[i] * gain * 0.7;
                const pX = centerX + Math.cos(angle) * r;
                const pY = centerY + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(pX, pY); else ctx.lineTo(pX, pY);
            }
            ctx.closePath();
            ctx.stroke();

            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            for (let i = 0; i < bufferLength; i++) {
                const angle = -(i / bufferLength) * Math.PI * 2 + (Date.now() * 0.0008);
                const r = baseRadius - 12 + dataArray[Math.floor(i * 0.5)] * gain * 0.35;
                const pX = centerX + Math.cos(angle) * r;
                const pY = centerY + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(pX, pY); else ctx.lineTo(pX, pY);
            }
            ctx.closePath();
            ctx.stroke();
        }
        else if (currentStyle === 'nebula') {
            let bass = 0, mid = 0, high = 0;
            for(let i=0; i<15; i++) bass += dataArray[i];
            for(let i=15; i<80; i++) mid += dataArray[i];
            for(let i=80; i<bufferLength; i++) high += dataArray[i];
            bass = (bass / 15) * gain; mid = (mid / 65) * gain; high = (high / (bufferLength - 80)) * gain;

            particles.forEach((p, idx) => {
                let modSpeed = 1 + (p.color === '#00ffcc' ? bass * 0.06 : high * 0.09);
                p.x += p.baseSpeedX * modSpeed * 0.12; p.y += p.baseSpeedY * modSpeed * 0.12;
                if (p.x < 0) p.x = 1; if (p.x > 1) p.x = 0; if (p.y < 0) p.y = 1; if (p.y > 1) p.y = 0;

                const px = p.x * w; const py = p.y * h;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(px, py, Math.max(0.5, p.radius + (mid * 0.05)), 0, Math.PI * 2);
                ctx.fill();

                if (idx < NUM_PARTICLES - 1 && bass > 60) {
                    const nextP = particles[idx + 1];
                    const dist = Math.hypot(px - (nextP.x * w), py - (nextP.y * h));
                    if (dist < 90) {
                        ctx.strokeStyle = `rgba(48, 54, 61, ${Math.min(0.35, bass / 255)})`;
                        ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(nextP.x * w, nextP.y * h); ctx.stroke();
                    }
                }
            });
        }
        else if (currentStyle === 'wave') {
            const sliceWidth = w / bufferLength;
            let x = 0;

            ctx.lineWidth = 3;
            ctx.strokeStyle = '#00ffcc';
            ctx.fillStyle = 'rgba(0, 255, 204, 0.15)';
            ctx.beginPath();
            ctx.moveTo(0, h);

            for (let i = 0; i < bufferLength; i++) {
                const v = (dataArray[i] / 255.0) * gain;
                const y = h - (v * h * 0.7);

                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);

                x += sliceWidth;
            }
            ctx.lineTo(w, h);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Zweite, versetzte Neon-Welle (Magenta)
            x = 0;
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#ff00ff';
            ctx.beginPath();
            for (let i = 0; i < bufferLength; i++) {
                const v = (dataArray[i] / 255.0) * gain;
                const y = h - (v * h * 0.4); 
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
                x += sliceWidth;
            }
            ctx.stroke();
        }
        else if (currentStyle === 'blocks') {
            const barWidth = (w / bufferLength) * 2.5;
            const blockHeight = 5;
            const blockSpacing = 2;
            let x = 0;

            for (let i = 0; i < bufferLength; i += 2) { 
                let val = dataArray[i] * gain;
                let numBlocks = Math.floor((val / 255) * (h / (blockHeight + blockSpacing)) * 0.9);

                for (let j = 0; j < numBlocks; j++) {
                    let y = h - (j * (blockHeight + blockSpacing)) - blockHeight;
                    let ratio = j / (h / (blockHeight + blockSpacing));
                    
                    ctx.fillStyle = `rgb(${Math.floor(ratio * 255)}, ${Math.floor((1 - ratio) * 255)}, 204)`;
                    ctx.fillRect(x, y, barWidth - 2, blockHeight);
                }
                x += barWidth;
            }
        }
        else if (currentStyle === 'nova') {
            let bassSum = 0;
            for (let i = 0; i < 15; i++) bassSum += dataArray[i];
            const baseRadius = 40 + (bassSum / 15) * gain * 0.3;

            ctx.fillStyle = `rgba(255, 0, 255, ${Math.min(1, (bassSum/15)*gain/255)})`;
            ctx.beginPath();
            ctx.arc(centerX, centerY, baseRadius * 0.8, 0, Math.PI * 2);
            ctx.fill();

            for (let i = 0; i < bufferLength; i += 3) {
                const angle = (i / bufferLength) * Math.PI * 2 + (Date.now() * 0.0003);
                const val = dataArray[i] * gain * 1.2;
                const length = baseRadius + val;

                const startX = centerX + Math.cos(angle) * baseRadius;
                const startY = centerY + Math.sin(angle) * baseRadius;
                const endX = centerX + Math.cos(angle) * length;
                const endY = centerY + Math.sin(angle) * length;

                ctx.strokeStyle = i % 2 === 0 ? '#00ffcc' : '#ff00ff';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(endX, endY);
                ctx.stroke();

                if (val > 40) {
                    ctx.fillStyle = '#ffd700';
                    ctx.beginPath();
                    ctx.arc(endX, endY, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }
    }
    renderPipeline();
</script>
