<style>
    .module-wrapper {
        display: flex;
        flex-direction: column;
        gap: 15px;
        height: 100%;
        font-family: 'Courier New', Courier, monospace;
        color: #c9d1d9;
    }

    .module-header {
        border-bottom: 1px solid #30363d;
        padding-bottom: 8px;
    }

    .module-header h3 {
        color: #00ffcc;
        margin: 0 0 5px 0;
        font-size: 1.1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .module-header p {
        font-size: 0.8rem;
        color: #8b949e;
        margin: 0;
    }

    /* Das "Oszilloskop" */
    .canvas-container {
        width: 100%;
        background-color: #05070a;
        border: 1px solid #30363d;
        border-radius: 4px;
        position: relative;
        overflow: hidden;
        box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
    }

    canvas {
        display: block;
        width: 100%;
        height: 350px;
    }

    /* Steuerungselemente */
    .telemetry-controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        background-color: #161b22;
        padding: 15px;
        border: 1px solid #30363d;
        border-radius: 4px;
    }

    .control-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    label {
        font-size: 0.8rem;
        color: #ffd700;
        text-transform: uppercase;
    }

    select, input[type="text"] {
        background-color: #0d1117;
        border: 1px solid #30363d;
        color: #c9d1d9;
        padding: 8px;
        font-family: inherit;
        font-size: 0.85rem;
    }

    select:focus, input[type="text"]:focus {
        outline: none;
        border-color: #ff00ff;
    }

    .btn-action {
        padding: 8px;
        background-color: transparent;
        border: 1px solid #00ffcc;
        color: #00ffcc;
        cursor: pointer;
        font-weight: bold;
        text-transform: uppercase;
        transition: all 0.2s;
        font-family: inherit;
    }

    .btn-action:hover {
        background-color: #00ffcc;
        color: #0d1117;
    }

    .btn-action.halt {
        border-color: #ff7b72;
        color: #ff7b72;
    }

    .btn-action.halt:hover {
        background-color: #ff7b72;
        color: #0d1117;
    }

    /* Telemetrie-Werte HUD */
    .hud-overlay {
        position: absolute;
        top: 10px;
        right: 10px;
        background-color: rgba(13, 17, 23, 0.8);
        border: 1px solid #30363d;
        padding: 8px 12px;
        font-size: 0.75rem;
        pointer-events: none;
    }

    .hud-val { color: #00ffcc; font-weight: bold; }
    .hud-peak { color: #ff00ff; font-weight: bold; }

</style>

<div class="module-wrapper">
    <div class="module-header">
        <h3 data-mi18n="m_title">Kinetic Telemetry Engine</h3>
        <p data-mi18n="m_desc">Native GPU-beschleunigte HTML5 Canvas Datenvisualisierung.</p>
    </div>

    <div class="canvas-container">
        <!-- Native Zeichenfläche -->
        <canvas id="telemetry-canvas"></canvas>
        <div class="hud-overlay">
            <div>CURR: <span class="hud-val" id="hud-current">0.00</span></div>
            <div>PEAK: <span class="hud-peak" id="hud-peak">0.00</span></div>
            <div>FPS:  <span class="hud-val" id="hud-fps">0</span></div>
        </div>
    </div>

    <div class="telemetry-controls">
        <div class="control-group">
            <label data-mi18n="l_source">Datenquelle (Stream)</label>
            <select id="data-source">
                <option value="sine" data-mi18n="o_sine">Resonanz-Welle (Sinus)</option>
                <option value="noise" data-mi18n="o_noise">Stochastisches Rauschen</option>
                <option value="pulse" data-mi18n="o_pulse">Elektrokardiogramm (Puls)</option>
            </select>
            <button class="btn-action" id="btn-toggle" data-mi18n="b_pause">Stream Pausieren</button>
        </div>

        <div class="control-group">
            <label data-mi18n="l_speed">Geschwindigkeit (Takt)</label>
            <input type="range" id="speed-slider" min="1" max="20" value="5">
            <label data-mi18n="l_gain">Amplitude (Gain)</label>
            <input type="range" id="gain-slider" min="10" max="200" value="80">
        </div>

        <div class="control-group">
            <label data-mi18n="l_csv">Statischer CSV Input</label>
            <!-- Platzhalter wird von JS übersetzt -->
            <input type="text" id="csv-input" placeholder="z.B. 10,40,20,80,30,90,10">
            <button class="btn-action" id="btn-plot-csv" style="border-color: #ff00ff; color: #ff00ff;" data-mi18n="b_plot">CSV Plotten</button>
        </div>
    </div>
</div>

<script>
    const root = typeof shadowRoot !== 'undefined' ? shadowRoot : document;

    // ==========================================
    // 1. MODUL-LOKALE i18n ÜBERSETZUNGS-ENGINE
    // ==========================================
    const mod_i18n = {
        lang: localStorage.getItem('arte_lang_pref') || 'de',
        
        dict: {
            de: {
                m_title: "Kinetic Telemetry Engine", m_desc: "Native GPU-beschleunigte HTML5 Canvas Datenvisualisierung.",
                l_source: "Datenquelle (Stream)", o_sine: "Resonanz-Welle (Sinus)", o_noise: "Stochastisches Rauschen", o_pulse: "Elektrokardiogramm (Puls)",
                b_pause: "Stream Pausieren", b_resume: "Stream Fortsetzen",
                l_speed: "Geschwindigkeit (Takt)", l_gain: "Amplitude (Gain)",
                l_csv: "Statischer CSV Input", placeholder: "z.B. 10,40,20,80,30,90,10", b_plot: "CSV Plotten"
            },
            en: {
                m_title: "Kinetic Telemetry Engine", m_desc: "Native GPU-accelerated HTML5 Canvas Data Visualization.",
                l_source: "Data Source (Stream)", o_sine: "Resonance Wave (Sine)", o_noise: "Stochastic Noise", o_pulse: "Electrocardiogram (Pulse)",
                b_pause: "Pause Stream", b_resume: "Resume Stream",
                l_speed: "Speed (BPM)", l_gain: "Amplitude (Gain)",
                l_csv: "Static CSV Input", placeholder: "e.g. 10,40,20,80,30,90,10", b_plot: "Plot CSV"
            }
        },

        t: function(key) { return this.dict[this.lang][key] || key; },

        updateUI: function() {
            // Normale Textknoten und Label übersetzen
            root.querySelectorAll('[data-mi18n]').forEach(el => {
                el.innerHTML = this.t(el.getAttribute('data-mi18n'));
            });

            // Input Placeholder übersetzen
            const csvField = root.getElementById('csv-input');
            if (csvField) csvField.placeholder = this.t('placeholder');

            // Dynamischen Button Text an den aktuellen State anpassen
            const btn = root.getElementById('btn-toggle');
            if (btn) {
                if (isRunning) btn.textContent = this.t('b_pause');
                else btn.textContent = this.t('b_resume');
            }
        }
    };

    // ANTENNE: Horcht auf das OS, ob sich die Sprache geändert hat
    if (window.osBus) {
        window.osBus.on('lang-changed', (newLang) => {
            mod_i18n.lang = newLang;
            mod_i18n.updateUI();
        });
    }

    // Beim Start sofort Sprache triggern
    setTimeout(() => { mod_i18n.updateUI(); }, 50);


    // ==========================================
    // 2. ORIGINAL MODUL LOGIK (Unangetastet!)
    // ==========================================
    const canvas = root.getElementById('telemetry-canvas');
    const ctx = canvas.getContext('2d');
    
    const dataSource = root.getElementById('data-source');
    const speedSlider = root.getElementById('speed-slider');
    const gainSlider = root.getElementById('gain-slider');
    const btnToggle = root.getElementById('btn-toggle');
    const csvInput = root.getElementById('csv-input');
    const btnPlotCsv = root.getElementById('btn-plot-csv');

    const hudCurrent = root.getElementById('hud-current');
    const hudPeak = root.getElementById('hud-peak');
    const hudFps = root.getElementById('hud-fps');

    function resizeCanvas() {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
    }
    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 100);

    let dataBuffer = [];
    const MAX_POINTS = 300; 
    
    let isRunning = true;
    let animationId = null;
    let timeStep = 0;
    
    let lastFrameTime = performance.now();
    let frameCount = 0;
    let fps = 0;

    for(let i = 0; i < MAX_POINTS; i++) dataBuffer.push(0);

    function generateNextValue() {
        const type = dataSource.value;
        const speed = parseFloat(speedSlider.value) / 100;
        const gain = parseFloat(gainSlider.value);
        
        timeStep += speed;

        if (type === 'sine') {
            return Math.sin(timeStep) * (gain * 0.7) + Math.cos(timeStep * 2.5) * (gain * 0.3);
        } else if (type === 'noise') {
            const randomDelta = (Math.random() - 0.5) * (gain * 0.5);
            let nextVal = dataBuffer[dataBuffer.length - 1] + randomDelta;
            if (nextVal > gain) nextVal -= Math.abs(randomDelta) * 2;
            if (nextVal < -gain) nextVal += Math.abs(randomDelta) * 2;
            return nextVal;
        } else if (type === 'pulse') {
            if (Math.random() > 0.95) return gain;
            if (Math.random() > 0.9) return -gain * 0.5;
            return (Math.random() - 0.5) * (gain * 0.05);
        }
        return 0;
    }

    function renderFrame() {
        const w = canvas.width;
        const h = canvas.height;
        const centerY = h / 2;

        ctx.clearRect(0, 0, w, h);

        ctx.strokeStyle = '#161b22';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for(let x = 0; x < w; x += 50) { ctx.moveTo(x, 0); ctx.lineTo(x, h); }
        for(let y = 0; y < h; y += 50) { ctx.moveTo(0, y); ctx.lineTo(w, y); }
        ctx.stroke();

        ctx.strokeStyle = '#30363d';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, centerY);
        ctx.lineTo(w, centerY);
        ctx.stroke();

        ctx.strokeStyle = '#00ffcc'; 
        ctx.lineWidth = 2;
        ctx.lineJoin = 'round';
        
        ctx.beginPath();
        const stepX = w / (MAX_POINTS - 1);
        
        let currentPeak = 0;

        for (let i = 0; i < MAX_POINTS; i++) {
            const val = dataBuffer[i];
            const x = i * stepX;
            const y = centerY - val; 
            
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);

            if (Math.abs(val) > currentPeak) currentPeak = Math.abs(val);
        }
        ctx.stroke();

        ctx.strokeStyle = 'rgba(0, 255, 204, 0.3)';
        ctx.lineWidth = 6;
        ctx.stroke();

        const latestVal = dataBuffer[dataBuffer.length - 1];
        hudCurrent.textContent = latestVal.toFixed(2);
        hudPeak.textContent = currentPeak.toFixed(2);
        
        if (Math.abs(latestVal) > parseFloat(gainSlider.value) * 0.9) {
            hudCurrent.style.color = '#ff7b72'; 
        } else {
            hudCurrent.style.color = '#00ffcc';
        }

        const now = performance.now();
        frameCount++;
        if (now - lastFrameTime >= 1000) {
            hudFps.textContent = frameCount;
            frameCount = 0;
            lastFrameTime = now;
        }
    }

    function engineLoop() {
        if (isRunning) {
            dataBuffer.shift();
            dataBuffer.push(generateNextValue());
        }
        
        renderFrame();
        animationId = requestAnimationFrame(engineLoop);
    }

    // ACHTUNG: Hier wurde die Beschriftung in das i18n Objekt ausgelagert!
    btnToggle.addEventListener('click', () => {
        isRunning = !isRunning;
        if (isRunning) {
            btnToggle.textContent = mod_i18n.t('b_pause');
            btnToggle.classList.remove('halt');
        } else {
            btnToggle.textContent = mod_i18n.t('b_resume');
            btnToggle.classList.add('halt');
        }
    });

    btnPlotCsv.addEventListener('click', () => {
        const raw = csvInput.value;
        if (!raw) return;
        
        const values = raw.split(',').map(v => parseFloat(v.trim())).filter(v => !isNaN(v));
        if (values.length === 0) return;

        const maxVal = Math.max(...values.map(Math.abs));
        gainSlider.value = maxVal > 0 ? maxVal * 1.2 : 100;

        isRunning = false;
        btnToggle.textContent = mod_i18n.t('b_resume');
        btnToggle.classList.add('halt');

        dataBuffer.fill(0);
        const startIndex = MAX_POINTS - values.length;
        
        for (let i = 0; i < values.length; i++) {
            if (startIndex + i >= 0 && startIndex + i < MAX_POINTS) {
                dataBuffer[startIndex + i] = values[i];
            }
        }
        renderFrame();
    });

    new ResizeObserver(() => {
        resizeCanvas();
        if (!isRunning) renderFrame(); 
    }).observe(canvas.parentElement);

    engineLoop();
</script>
