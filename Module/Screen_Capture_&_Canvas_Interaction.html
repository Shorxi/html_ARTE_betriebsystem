<style>
    .module-wrapper {
        display: flex;
        flex-direction: column;
        gap: 15px;
        height: 100%;
        font-family: 'Courier New', Courier, monospace;
        color: #c9d1d9;
    }

    .module-header {
        border-bottom: 1px solid #30363d;
        padding-bottom: 8px;
    }

    .module-header h3 {
        color: #00ffcc;
        margin: 0 0 5px 0;
        font-size: 1.1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .workspace-split {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        flex: 1;
        min-height: 450px;
    }

    @media (max-width: 1024px) { .workspace-split { grid-template-columns: 1fr; } }

    .panel-sector {
        background-color: #161b22;
        border: 1px solid #30363d;
        border-radius: 4px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        transition: all 0.2s ease-in-out;
    }

    /* V3.1: Fokus-Raum (Fullscreen Studio) Isolation */
    .panel-sector.studio-fullscreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 99999;
        background-color: #0d1117; /* Darker background for focus */
        padding: 20px;
        border: none;
        border-radius: 0;
        margin: 0;
    }

    .sector-title {
        font-size: 0.85rem;
        color: #ffd700;
        text-transform: uppercase;
        border-bottom: 1px solid #30363d;
        padding-bottom: 5px;
    }

    /* Live-Feed Viewport */
    .stream-viewport {
        width: 100%;
        height: 280px;
        background-color: #05070a;
        border: 1px solid #30363d;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
    }

    video {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    /* Bearbeitungs-Studio Canvas */
    .canvas-viewport {
        width: 100%;
        height: 380px;
        background-color: #05070a;
        border: 1px solid #30363d;
        position: relative;
        overflow: auto;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* V3.1: Adaptives Wachstum im Fullscreen */
    .studio-fullscreen .canvas-viewport {
        flex: 1; /* Nimmt den gesamten restlichen vertikalen Platz ein */
        height: auto;
        border-color: #ff00ff; /* Subtile visuelle Bestätigung des Fokus-Modus */
    }

    canvas {
        background-color: transparent;
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
        cursor: crosshair;
        max-width: 100%;
        max-height: 100%;
    }

    .control-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 8px;
    }

    .btn-core {
        padding: 10px;
        background-color: transparent;
        border: 1px solid #00ffcc;
        color: #00ffcc;
        cursor: pointer;
        font-weight: bold;
        text-transform: uppercase;
        font-family: inherit;
        font-size: 0.75rem;
        text-align: center;
        transition: all 0.2s;
    }

    .btn-core:hover {
        background-color: #00ffcc;
        color: #0d1117;
    }

    .btn-core.active {
        border-color: #ff00ff;
        color: #ff00ff;
        background-color: rgba(255, 0, 255, 0.05);
    }

    .btn-core.danger { border-color: #ff7b72; color: #ff7b72; }
    .btn-core.danger:hover { background-color: #ff7b72; color: #0d1117; }

    /* V3.1: Der Exit-Schalter für den Fokus-Raum */
    .btn-close-fs {
        display: none;
        position: absolute;
        top: 20px;
        right: 20px;
        background-color: #ff7b72;
        color: #0d1117;
        border: none;
        width: 45px;
        height: 45px;
        font-size: 1.5rem;
        font-weight: bold;
        cursor: pointer;
        z-index: 100000;
        border-radius: 4px;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 15px rgba(255, 123, 114, 0.5);
        transition: transform 0.1s;
    }

    .btn-close-fs:hover { transform: scale(1.05); background-color: #ff0000; }
    .studio-fullscreen .btn-close-fs { display: flex; }

    select {
        background-color: #0d1117;
        border: 1px solid #30363d;
        color: #c9d1d9;
        padding: 8px;
        font-family: inherit;
        font-size: 0.8rem;
    }

    .status-hud {
        font-size: 0.8rem;
        color: #ffd700;
        text-align: center;
        min-height: 15px;
        background-color: #0d1117;
        padding: 6px;
        border: 1px solid #30363d;
    }
</style>

<div class="module-wrapper">
    <div class="module-header">
        <h3>Kinetic Capture & Imaging Engine V3.1</h3>
        <span style="font-size: 0.75rem; color: #8b949e;">Hardware Matrix & Focus Room Edit Environment</span>
    </div>

    <div class="workspace-split">
        <div class="panel-sector">
            <div class="sector-title">📡 Satelliten-Feed (Hardware-Kopplung)</div>
            <div class="stream-viewport">
                <video id="feed-player" autoplay playsinline muted></video>
            </div>
            
            <div class="control-row">
                <button class="btn-core" id="btn-connect-source">1. Tab/Screen koppeln</button>
                <button class="btn-core" id="btn-snapshot" disabled>2. 📸 Snapshot fixieren</button>
            </div>

            <div class="sector-title" style="margin-top: 10px;">📹 Video-Modulation (Rekorder)</div>
            <div class="control-row">
                <select id="video-format-select"></select>
                <button class="btn-core" id="btn-record-video" disabled>Start Record</button>
            </div>
        </div>

        <div class="panel-sector" id="studio-panel">
            <button class="btn-close-fs" id="btn-close-fullscreen" title="Vollbild beenden">✖</button>
            
            <div class="sector-title">🎨 Bildbearbeitungs-Studio (Matrix)</div>
            <div class="control-row">
                <button class="btn-core" id="btn-tool-marker">🖊 Transparenter Marker</button>
                <button class="btn-core" id="btn-tool-crop">✂ Snipping Box</button>
                <button class="btn-core" id="btn-toggle-fullscreen" style="border-color: #ffd700; color: #ffd700;">⛶ Fokus Vollbild</button>
            </div>

            <div class="canvas-viewport" id="canvas-viewport-container">
                <canvas id="studio-canvas"></canvas>
            </div>

            <div class="control-row">
                <button class="btn-core danger" id="btn-tool-back">↩ Zurück / Reset</button>
                <select id="image-format-select" style="max-width: 150px;">
                    <option value="image/png">.PNG Format</option>
                    <option value="image/jpeg">.JPG Format</option>
                </select>
                <button class="btn-core" id="btn-save-image" style="border-color: #ff00ff; color: #ff00ff;" disabled>Grafik speichern</button>
            </div>
        </div>
    </div>

    <div class="status-hud" id="hud-status">Koppele das System mit einem Ziel-Tab, um Firewalls legal zu überwinden.</div>
</div>

<script>
    const video = shadowRoot.getElementById('feed-player');
    const canvas = shadowRoot.getElementById('studio-canvas');
    const ctx = canvas.getContext('2d');

    const studioPanel = shadowRoot.getElementById('studio-panel');
    const btnToggleFullscreen = shadowRoot.getElementById('btn-toggle-fullscreen');
    const btnCloseFullscreen = shadowRoot.getElementById('btn-close-fullscreen');

    const btnConnect = shadowRoot.getElementById('btn-connect-source');
    const btnSnapshot = shadowRoot.getElementById('btn-snapshot');
    const btnRecord = shadowRoot.getElementById('btn-record-video');
    const videoFormat = shadowRoot.getElementById('video-format-select');
    
    const btnMarker = shadowRoot.getElementById('btn-tool-marker');
    const btnCrop = shadowRoot.getElementById('btn-tool-crop');
    const btnBack = shadowRoot.getElementById('btn-tool-back');
    const btnSaveImg = shadowRoot.getElementById('btn-save-image');
    const imageFormat = shadowRoot.getElementById('image-format-select');
    const hudStatus = shadowRoot.getElementById('hud-status');

    let captureStream = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;

    let snapshotFrame = null; 
    let drawingCanvas = document.createElement('canvas'); 
    let dCtx = drawingCanvas.getContext('2d');

    let currentMode = 'idle'; 
    let isDrawing = false;
    let startX = 0, startY = 0;
    let currentX = 0, currentY = 0;

    // --- V3.1 Fullscreen Studio Logic ---
    btnToggleFullscreen.addEventListener('click', () => {
        studioPanel.classList.add('studio-fullscreen');
        hudStatus.textContent = 'Fokus-Raum aktiv. Maximale Präzision freigeschaltet.';
    });

    btnCloseFullscreen.addEventListener('click', () => {
        studioPanel.classList.remove('studio-fullscreen');
        hudStatus.textContent = 'Fokus-Raum verlassen. Normalbetrieb.';
    });

    // --- Codec Scanner ---
    function scanVideoCodecs() {
        const types = [
            { mime: 'video/mp4; codecs="avc1.42E01E, mp4a.40.2"', ext: 'mp4', label: 'MP4 (H.264 HQ)' },
            { mime: 'video/mp4', ext: 'mp4', label: 'MP4 (Standard)' },
            { mime: 'video/webm; codecs=vp9', ext: 'webm', label: 'WebM (VP9 HQ)' },
            { mime: 'video/webm', ext: 'webm', label: 'WebM (Standard)' }
        ];
        types.forEach(t => {
            if (MediaRecorder.isTypeSupported(t.mime)) {
                const opt = document.createElement('option');
                opt.value = JSON.stringify({ mime: t.mime, ext: t.ext });
                opt.textContent = t.label;
                videoFormat.appendChild(opt);
            }
        });
    }
    scanVideoCodecs();

    // 1. Hardware Kopplung (Bypasses X-Frame-Options & CORS)
    btnConnect.addEventListener('click', async () => {
        try {
            if (captureStream) captureStream.getTracks().forEach(t => t.stop());

            captureStream = await navigator.mediaDevices.getDisplayMedia({
                video: { displaySurface: "browser" },
                audio: false
            });

            video.srcObject = captureStream;
            btnSnapshot.disabled = false;
            btnRecord.disabled = false;
            hudStatus.textContent = 'SATELLITEN-KOPPLUNG ERFOLGREICH. Ziel im Visier.';
            hudStatus.style.color = '#00ffcc';

            captureStream.getVideoTracks()[0].onended = () => {
                hudStatus.textContent = 'Verbindung durch Operator getrennt.';
                hudStatus.style.color = '#ffd700';
                btnSnapshot.disabled = true;
                btnRecord.disabled = true;
            };
        } catch (err) {
            hudStatus.textContent = `Kopplung verweigert: ${err.message}`;
            hudStatus.style.color = '#ff7b72';
        }
    });

    // 2. Video Record Logic
    btnRecord.addEventListener('click', () => {
        if (!captureStream) return;
        if (!isRecording) {
            recordedChunks = [];
            const codecConfig = JSON.parse(videoFormat.value);
            try { mediaRecorder = new MediaRecorder(captureStream, { mimeType: codecConfig.mime }); } 
            catch(e) { mediaRecorder = new MediaRecorder(captureStream); }

            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: codecConfig.mime });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `ARTE_Record_${new Date().getTime()}.${codecConfig.ext}`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
                hudStatus.textContent = 'Video exportiert.';
                hudStatus.style.color = '#00ffcc';
            };

            mediaRecorder.start();
            isRecording = true;
            btnRecord.textContent = '⏹ Stop Record';
            btnRecord.classList.add('danger');
            hudStatus.textContent = 'REKORDER LÄUFT...';
            hudStatus.style.color = '#ff00ff';
        } else {
            mediaRecorder.stop();
            isRecording = false;
            btnRecord.textContent = 'Start Record';
            btnRecord.classList.remove('danger');
        }
    });

    // 3. Snapshot Logic
    btnSnapshot.addEventListener('click', () => {
        if (!captureStream) return;
        const vW = video.videoWidth; const vH = video.videoHeight;
        if (vW === 0 || vH === 0) return;

        canvas.width = vW; canvas.height = vH;
        drawingCanvas.width = vW; drawingCanvas.height = vH;

        dCtx.clearRect(0, 0, vW, vH);
        ctx.drawImage(video, 0, 0, vW, vH);
        
        snapshotFrame = new Image();
        snapshotFrame.src = canvas.toDataURL('image/png');
        snapshotFrame.onload = () => {
            renderStudio();
            btnSaveImg.disabled = false;
            hudStatus.textContent = `Snapshot fixiert (${vW}x${vH}px). Studio bereit.`;
            hudStatus.style.color = '#00ffcc';
        };
    });

    // 4. Studio Renderer
    function renderStudio() {
        if (!snapshotFrame) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.globalCompositeOperation = 'source-over';
        ctx.drawImage(snapshotFrame, 0, 0);

        ctx.globalCompositeOperation = 'multiply';
        ctx.drawImage(drawingCanvas, 0, 0);

        ctx.globalCompositeOperation = 'source-over';

        if (currentMode === 'crop' && isDrawing) {
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 3;
            ctx.setLineDash([8, 4]);
            ctx.strokeRect(startX, startY, currentX - startX, currentY - startY);
            ctx.setLineDash([]);

            ctx.fillStyle = 'rgba(5, 7, 10, 0.4)';
            ctx.fillRect(0, 0, canvas.width, startY);
            ctx.fillRect(0, startY, startX, canvas.height - startY);
            ctx.fillRect(currentX, startY, canvas.width - currentX, canvas.height - startY);
            ctx.fillRect(startX, currentY, currentX - startX, canvas.height - currentY);
        }
    }

    // 5. Input Handling (Mathematisch skalierbar für Fullscreen)
    function getCanvasCoordinates(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const cX = e.touches ? e.touches[0].clientX : e.clientX;
        const cY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (cX - rect.left) * scaleX, y: (cY - rect.top) * scaleY };
    }

    function pointerDown(e) {
        if (!snapshotFrame || currentMode === 'idle') return;
        isDrawing = true;
        const coords = getCanvasCoordinates(e);
        startX = coords.x; startY = coords.y; currentX = coords.x; currentY = coords.y;
        if (currentMode === 'marker') { dCtx.beginPath(); dCtx.moveTo(startX, startY); }
    }

    function pointerMove(e) {
        if (!isDrawing || !snapshotFrame) return;
        const coords = getCanvasCoordinates(e);
        currentX = coords.x; currentY = coords.y;

        if (currentMode === 'marker') {
            dCtx.lineTo(currentX, currentY);
            dCtx.strokeStyle = 'rgb(255, 255, 0)'; 
            dCtx.lineWidth = 26;
            dCtx.lineCap = 'square';
            dCtx.lineJoin = 'miter';
            dCtx.stroke();
        }
        renderStudio();
    }

    function pointerUp() {
        if (!isDrawing) return;
        isDrawing = false;
        if (currentMode === 'crop') {
            const cropW = Math.abs(currentX - startX);
            const cropH = Math.abs(currentY - startY);
            const x = Math.min(startX, currentX);
            const y = Math.min(startY, currentY);

            if (cropW > 15 && cropH > 15) {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = cropW; tempCanvas.height = cropH;
                const tCtx = tempCanvas.getContext('2d');

                tCtx.drawImage(canvas, x, y, cropW, cropH, 0, 0, cropW, cropH);

                canvas.width = cropW; canvas.height = cropH;
                drawingCanvas.width = cropW; drawingCanvas.height = cropH;

                dCtx.clearRect(0, 0, cropW, cropH);
                snapshotFrame = new Image();
                snapshotFrame.src = tempCanvas.toDataURL('image/png');
                snapshotFrame.onload = () => {
                    renderStudio();
                    hudStatus.textContent = `Zuschnitt fixiert: ${cropW}x${cropH}px.`;
                };
            }
        }
    }

    canvas.addEventListener('mousedown', pointerDown);
    canvas.addEventListener('mousemove', pointerMove);
    window.addEventListener('mouseup', pointerUp);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); pointerDown(e); }, { passive: false });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); pointerMove(e); }, { passive: false });
    canvas.addEventListener('touchend', pointerUp);

    // 6. UI Controls
    btnMarker.addEventListener('click', () => {
        currentMode = 'marker';
        btnMarker.classList.add('active'); btnCrop.classList.remove('active');
        hudStatus.textContent = 'Transparenter Marker geladen.';
    });

    btnCrop.addEventListener('click', () => {
        currentMode = 'crop';
        btnCrop.classList.add('active'); btnMarker.classList.remove('active');
        hudStatus.textContent = 'Snipping Werkzeug aktiv. Bereich ziehen.';
    });

    btnBack.addEventListener('click', () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        dCtx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);
        snapshotFrame = null;
        currentMode = 'idle';
        btnMarker.classList.remove('active'); btnCrop.classList.remove('active');
        btnSaveImg.disabled = true;
        hudStatus.textContent = 'Studio bereinigt. Bereit für neuen Snapshot.';
        hudStatus.style.color = '#ffd700';
    });

    btnSaveImg.addEventListener('click', () => {
        if (!snapshotFrame) return;
        const ext = imageFormat.value === 'image/png' ? 'png' : 'jpg';
        const url = canvas.toDataURL(imageFormat.value, 0.95);
        const a = document.createElement('a');
        a.href = url; a.download = `ARTE_Capture_${new Date().getTime()}.${ext}`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        if (window.osBus) window.osBus.emit('log', { msg: `Grafik als ${ext} exportiert.` });
    });
</script>
