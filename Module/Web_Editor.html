<style>
    .module-wrapper {
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-height: 850px;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        color: #c9d1d9;
        background-color: #0d1117;
        border: 1px solid #30363d;
        position: relative;
    }

    .module-header {
        border-bottom: 1px solid #30363d;
        padding: 10px 15px;
        background-color: #161b22;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .module-header h3 {
        color: #00ffcc;
        margin: 0;
        font-size: 1.1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-family: 'Courier New', Courier, monospace;
    }

    /* Kinetische & Sticky Werkzeugleiste */
    .toolbar {
        position: sticky;
        top: 0;
        z-index: 1000;
        background-color: #161b22;
        border-bottom: 1px solid #30363d;
        padding: 8px 15px;
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        align-items: center;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }

    .toolbar-group {
        display: flex;
        align-items: center;
        gap: 8px;
        border-right: 1px solid #30363d;
        padding-right: 15px;
    }

    .toolbar-group:last-child {
        border-right: none;
    }

    .btn-tool {
        background: transparent;
        border: 1px solid #00ffcc;
        color: #00ffcc;
        cursor: pointer;
        padding: 6px 12px;
        font-size: 0.8rem;
        text-transform: uppercase;
        font-weight: bold;
        border-radius: 3px;
        transition: all 0.2s;
    }

    .btn-tool:hover { background-color: #00ffcc; color: #0d1117; }
    
    .btn-tool.export { border-color: #ff00ff; color: #ff00ff; }
    .btn-tool.export:hover { background-color: #ff00ff; color: #0d1117; }

    .btn-tool.import { border-color: #ffd700; color: #ffd700; }
    .btn-tool.import:hover { background-color: #ffd700; color: #0d1117; }

    input[type="text"] {
        background-color: #0d1117;
        border: 1px solid #30363d;
        color: #c9d1d9;
        padding: 6px 10px;
        font-size: 0.85rem;
        border-radius: 3px;
        width: 200px;
        font-family: 'Courier New', Courier, monospace;
    }

    input:focus { outline: none; border-color: #00ffcc; }

    /* Checkbox Toggle fГјr Live-Update */
    .toggle-container {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 0.8rem;
        color: #8b949e;
        text-transform: uppercase;
        cursor: pointer;
    }
    
    .toggle-container input {
        cursor: pointer;
        accent-color: #00ffcc;
    }

    /* Operations-Zentrale: Editor & Preview */
    .editor-matrix {
        display: grid;
        grid-template-columns: 1fr 1fr;
        flex: 1;
        overflow: hidden;
    }

    @media (max-width: 1024px) {
        .editor-matrix { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
    }

    /* Linker Sektor: Code Editor */
    .code-pane {
        display: flex;
        flex-direction: column;
        border-right: 1px solid #30363d;
        background-color: #0d1117;
    }

    .pane-label {
        background-color: #161b22;
        color: #8b949e;
        font-size: 0.75rem;
        text-transform: uppercase;
        padding: 4px 10px;
        border-bottom: 1px solid #30363d;
        display: flex;
        justify-content: space-between;
    }

    textarea#web-editor {
        flex: 1;
        background-color: #0d1117;
        border: none;
        color: #c9d1d9;
        padding: 15px;
        font-family: 'Courier New', Consolas, monospace;
        font-size: 0.9rem;
        line-height: 1.5;
        resize: none;
        white-space: pre;
        overflow-wrap: normal;
        overflow-x: auto;
    }

    textarea#web-editor:focus { outline: none; }

    /* Rechter Sektor: Live Preview */
    .preview-pane {
        display: flex;
        flex-direction: column;
        background-color: #ffffff; 
        position: relative;
    }

    /* Fullscreen Modus */
    .preview-pane.fs-active {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 9999;
        background-color: #ffffff;
    }

    /* Der zentrierte SchlieГџen-Button */
    #btn-close-fs {
        display: none;
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background-color: #161b22;
        color: #ff7b72;
        border: 2px solid #ff7b72;
        padding: 8px 25px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        z-index: 10000;
        border-radius: 4px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.2s;
    }

    #btn-close-fs:hover {
        background-color: #ff7b72;
        color: #0d1117;
    }

    .preview-pane.fs-active #btn-close-fs {
        display: block;
    }

    iframe#live-preview {
        flex: 1;
        width: 100%;
        height: 100%;
        border: none;
        background-color: #ffffff;
    }

    input[type="file"] { display: none; }
    
    .status-msg {
        font-size: 0.75rem;
        color: #ffd700;
        text-transform: uppercase;
    }
</style>

<div class="module-wrapper">

                Live-Sync

                <span id="char-count" style="color: #00ffcc;">0 Bytes</span>
            </div>
            <textarea id="web-editor" spellcheck="false">

        <div class="preview-pane" id="preview-pane">
            <button id="btn-close-fs">X SchlieГџen</button>
            <div class="pane-label" id="preview-header" style="background-color: #f0f0f0; color: #333; border-bottom: 1px solid #ccc;">
                <span>рџ‘ЃпёЏ Live Viewport Output</span>
                <span class="status-msg" id="render-status" style="color: #28a745;">Online</span>

<script>
    const root = typeof shadowRoot !== 'undefined' ? shadowRoot : document;
    
    const editor = root.getElementById('web-editor');
    const preview = root.getElementById('live-preview');
    const previewPane = root.getElementById('preview-pane');
    const btnCloseFs = root.getElementById('btn-close-fs');
    const previewHeader = root.getElementById('preview-header');

    const btnRun = root.getElementById('btn-run');
    const toggleLive = root.getElementById('toggle-live');
    const charCount = root.getElementById('char-count');
    const renderStatus = root.getElementById('render-status');
    
    const btnImport = root.getElementById('btn-import');
    const fileImport = root.getElementById('file-import');
    const btnExport = root.getElementById('btn-export');
    const filenameInput = root.getElementById('doc-filename');

    // --- Core Engine: Render & Injection Logic ---
    function renderPreview() {
        let rawCode = editor.value;
        
        // UTF-8 Schutzmechanismus
        if (!rawCode.toLowerCase().includes('charset=')) {
            if (rawCode.toLowerCase().includes('<head>')) {
                rawCode = rawCode.replace(/<head>/i, '<head>\n    <meta charset="UTF-8">');
            } else {
                rawCode = `<head><meta charset="UTF-8"></head>\n` + rawCode;
            }
        }

        // Fullscreen-Trigger Injektion: 
        // Dieser Code wird unsichtbar in die Sandbox geschleust, um den Doppel-Klick zu registrieren.
        const fsInjection = "\n<scr" + "ipt>document.addEventListener('dblclick', function() { window.parent.postMessage('arte_fullscreen_trigger', '*'); });</scr" + "ipt>";
        
        preview.srcdoc = rawCode + fsInjection;
        
        charCount.textContent = `${new Blob([rawCode]).size} Bytes`;
        renderStatus.textContent = "Aktualisiert";
        renderStatus.style.color = "#28a745";
        setTimeout(() => { renderStatus.textContent = "Online"; }, 1000);
    }

    // --- Fullscreen Listener ---
    window.addEventListener('message', (e) => {
        if(e.data === 'arte_fullscreen_trigger') {
            previewPane.classList.add('fs-active');
            previewHeader.style.display = 'none'; // Blendet den schmalen Header im Vollbild aus
        }
    });

    btnCloseFs.addEventListener('click', () => {
        previewPane.classList.remove('fs-active');
        previewHeader.style.display = 'flex'; // Header wieder einblenden
    });

    // --- Editor Logic ---
    editor.addEventListener('input', () => {
        if (toggleLive.checked) renderPreview();
    });

    editor.addEventListener('keydown', function(e) {
        if (e.key === 'Tab') {
            e.preventDefault();
            const start = this.selectionStart;
            const end = this.selectionEnd;
            
            this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
            this.selectionStart = this.selectionEnd = start + 4;
            
            if (toggleLive.checked) renderPreview();
        }
    });

    btnRun.addEventListener('click', renderPreview);

    // --- I/O File System ---
    btnImport.addEventListener('click', () => fileImport.click());

    fileImport.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const nameWithoutExt = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
        filenameInput.value = nameWithoutExt;

        const reader = new FileReader();
        reader.onload = (event) => {
            editor.value = event.target.result;
            renderPreview();
            if (window.osBus) window.osBus.emit('log', { msg: `Web Editor: '${file.name}' geladen.` });
        };
        reader.readAsText(file, "UTF-8");
        e.target.value = '';
    });

    btnExport.addEventListener('click', () => {
        let code = editor.value;
        let filename = filenameInput.value.trim() || 'arte_web_module';
        
        if (!filename.toLowerCase().endsWith('.html')) filename += '.html';

        const blob = new Blob([code], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        if (window.osBus) window.osBus.emit('log', { msg: `Web Editor: '${filename}' exportiert.` });
    });

    renderPreview();
</script>
