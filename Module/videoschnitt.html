<style>
    .module-wrapper {
        display: flex;
        flex-direction: column;
        gap: 15px;
        height: 100%;
        font-family: 'Courier New', Courier, monospace;
        color: #c9d1d9;
    }

    .module-header {
        border-bottom: 1px solid #30363d;
        padding-bottom: 8px;
    }

    .module-header h3 {
        color: #00ffcc;
        margin: 0 0 5px 0;
        font-size: 1.1rem;
        text-transform: uppercase;
    }

    .input-group {
        display: flex;
        gap: 10px;
    }

    input[type="text"], input[type="file"], select {
        flex: 1;
        background-color: #0d1117;
        border: 1px solid #30363d;
        color: #c9d1d9;
        padding: 8px;
        font-family: inherit;
    }

    input[type="text"]:focus, select:focus {
        outline: none;
        border-color: #00ffcc;
    }

    .btn {
        padding: 8px 15px;
        background-color: transparent;
        border: 1px solid #00ffcc;
        color: #00ffcc;
        cursor: pointer;
        font-weight: bold;
        text-transform: uppercase;
        transition: all 0.2s;
    }

    .btn:hover {
        background-color: #00ffcc;
        color: #0d1117;
    }

    .btn-export {
        border-color: #ff00ff;
        color: #ff00ff;
        width: 100%;
        margin-top: 10px;
    }

    .btn-export:hover {
        background-color: #ff00ff;
        color: #0d1117;
    }

    .video-container {
        width: 100%;
        background-color: #000;
        border: 1px solid #30363d;
        border-radius: 4px;
        overflow: hidden;
        position: relative;
    }

    video {
        width: 100%;
        max-height: 300px;
        display: block;
    }

    .timeline-controls {
        background-color: #161b22;
        padding: 15px;
        border: 1px solid #30363d;
        border-radius: 4px;
    }

    .slider-container {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
    }

    .slider-label {
        width: 60px;
        font-size: 0.85rem;
        color: #ffd700;
    }

    input[type="range"] {
        flex: 1;
        accent-color: #00ffcc;
    }

    .time-display {
        width: 80px;
        text-align: right;
        font-size: 0.85rem;
    }

    .format-selection {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
    }

    .format-selection label {
        font-size: 0.85rem;
        color: #8b949e;
        white-space: nowrap;
    }

    .status-msg {
        font-size: 0.85rem;
        color: #ffd700;
        text-align: center;
        min-height: 15px;
    }

    .progress-bar-container {
        height: 4px;
        background: #30363d;
        width: 100%;
        display: none;
        margin-top: 10px;
    }

    .progress-bar {
        height: 100%;
        background: #ff00ff;
        width: 0%;
        transition: width 0.1s linear;
    }
</style>

<div class="module-wrapper">
    <div class="module-header">
        <h3>Kinetic Video Engine</h3>
        <span style="font-size: 0.75rem; color: #8b949e;">Real-Time Dubbing & Adaptive Codec Scanner</span>
    </div>

    <div class="input-group">
        <input type="text" id="url-input" placeholder="Google Drive URL oder direkte Video-URL...">
        <button class="btn" id="btn-load-url">Laden</button>
    </div>
    
    <div class="input-group" style="margin-top: -5px;">
        <input type="file" id="file-input" accept="video/*" title="Offline Video auswählen">
    </div>

    <div class="video-container">
        <video id="video-player" controls crossorigin="anonymous"></video>
    </div>

    <div class="timeline-controls">
        <div class="slider-container">
            <span class="slider-label">START IN</span>
            <input type="range" id="slider-start" min="0" max="100" value="0" step="0.1">
            <span class="time-display" id="time-start">0.0s</span>
        </div>
        <div class="slider-container">
            <span class="slider-label">CUT OUT</span>
            <input type="range" id="slider-end" min="0" max="100" value="100" step="0.1">
            <span class="time-display" id="time-end">0.0s</span>
        </div>
    </div>

    <div class="format-selection">
        <label for="format-select">Export-Format:</label>
        <select id="format-select">
            </select>
    </div>

    <button class="btn btn-export" id="btn-export">Prozessieren & Speichern</button>
    <div class="progress-bar-container" id="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="status-msg" id="status-display">System initialisiert. Scanne Codecs...</div>
</div>

<script>
    const video = shadowRoot.getElementById('video-player');
    const urlInput = shadowRoot.getElementById('url-input');
    const fileInput = shadowRoot.getElementById('file-input');
    const btnLoadUrl = shadowRoot.getElementById('btn-load-url');
    const btnExport = shadowRoot.getElementById('btn-export');
    
    const sliderStart = shadowRoot.getElementById('slider-start');
    const sliderEnd = shadowRoot.getElementById('slider-end');
    const timeStart = shadowRoot.getElementById('time-start');
    const timeEnd = shadowRoot.getElementById('time-end');
    const formatSelect = shadowRoot.getElementById('format-select');
    const statusDisplay = shadowRoot.getElementById('status-display');
    const progressContainer = shadowRoot.getElementById('progress-container');
    const progressBar = shadowRoot.getElementById('progress-bar');

    let videoDuration = 0;
    let isRecording = false;

    // --- System-Scan: Adaptive Codec Erkennung ---
    function scanSupportedCodecs() {
        // Liste potenzieller Formate (von bester Kompatibilität zu Fallbacks)
        const candidates = [
            { mime: 'video/mp4; codecs="avc1.42E01E, mp4a.40.2"', label: 'MP4 (H.264 High HQ)' },
            { mime: 'video/mp4', label: 'MP4 (Standard)' },
            { mime: 'video/webm; codecs="vp9, opus"', label: 'WebM (VP9 + Opus HQ)' },
            { mime: 'video/webm; codecs="vp8, vorbis"', label: 'WebM (VP8 Standard)' },
            { mime: 'video/webm', label: 'WebM (Basis Fallback)' }
        ];

        let found = 0;
        candidates.forEach(candidate => {
            if (MediaRecorder.isTypeSupported(candidate.mime)) {
                const opt = document.createElement('option');
                opt.value = candidate.mime;
                opt.textContent = candidate.label;
                formatSelect.appendChild(opt);
                found++;
            }
        });

        if (found > 0) {
            statusDisplay.textContent = `${found} native Codecs gefunden. System bereit.`;
        } else {
            statusDisplay.textContent = 'Warnung: Kein nativer Encoder im Browser gefunden.';
            statusDisplay.style.color = '#ff7b72';
            btnExport.disabled = true;
        }
    }

    // Direkt beim Start den Scan ausführen
    scanSupportedCodecs();

    // --- Formatierung der Zeit ---
    function formatTime(seconds) {
        return parseFloat(seconds).toFixed(1) + 's';
    }

    // --- Google Drive URL Parser ---
    function parseDriveURL(url) {
        const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
        if (match && match[1]) {
            statusDisplay.textContent = 'Google Drive ID erkannt. Generiere direkten Stream...';
            return `https://drive.google.com/uc?export=download&id=${match[1]}`;
        }
        return url; 
    }

    // --- Lade-Logik ---
    function loadVideoSource(src) {
        video.src = src;
        video.load();
        statusDisplay.textContent = 'Lade Video-Stream...';
    }

    btnLoadUrl.addEventListener('click', () => {
        const rawUrl = urlInput.value.trim();
        if (rawUrl) loadVideoSource(parseDriveURL(rawUrl));
    });

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const fileUrl = URL.createObjectURL(file);
            loadVideoSource(fileUrl);
            statusDisplay.textContent = `Lokale Datei geladen: ${file.name}`;
            urlInput.value = '';
        }
    });

    // --- Video Metadaten & Slider Logik ---
    video.addEventListener('loadedmetadata', () => {
        videoDuration = video.duration;
        
        sliderStart.max = videoDuration;
        sliderEnd.max = videoDuration;
        sliderEnd.value = videoDuration;

        timeStart.textContent = formatTime(0);
        timeEnd.textContent = formatTime(videoDuration);
        statusDisplay.textContent = 'Stream synchronisiert. Bereit für Schnitt.';
    });

    sliderStart.addEventListener('input', (e) => {
        if (parseFloat(sliderStart.value) >= parseFloat(sliderEnd.value)) {
            sliderStart.value = sliderEnd.value - 0.1;
        }
        timeStart.textContent = formatTime(sliderStart.value);
        video.currentTime = sliderStart.value; 
    });

    sliderEnd.addEventListener('input', (e) => {
        if (parseFloat(sliderEnd.value) <= parseFloat(sliderStart.value)) {
            sliderEnd.value = parseFloat(sliderStart.value) + 0.1;
        }
        timeEnd.textContent = formatTime(sliderEnd.value);
        video.currentTime = sliderEnd.value; 
    });

    // --- Die native Kopierwerk-Engine (Export) ---
    btnExport.addEventListener('click', async () => {
        if (!video.src || isRecording) return;

        const startTime = parseFloat(sliderStart.value);
        const endTime = parseFloat(sliderEnd.value);
        const cutDuration = endTime - startTime;
        
        // Gewähltes Format auslesen
        const selectedMimeType = formatSelect.value;
        const fileExtension = selectedMimeType.includes('mp4') ? 'mp4' : 'webm';

        if (cutDuration <= 0) {
            statusDisplay.textContent = 'Fehler: Ungültiger Schnittbereich.';
            return;
        }

        try {
            isRecording = true;
            btnExport.disabled = true;
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            statusDisplay.textContent = `Aufzeichnung in ${fileExtension.toUpperCase()} gestartet...`;
            statusDisplay.style.color = '#ff00ff';

            const stream = video.captureStream();
            const mediaRecorder = new MediaRecorder(stream, { mimeType: selectedMimeType });
            const recordedChunks = [];

            mediaRecorder.ondataavailable = e => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: selectedMimeType });
                const downloadUrl = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = `ARTE_Cut_${new Date().getTime()}.${fileExtension}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(downloadUrl);

                isRecording = false;
                btnExport.disabled = false;
                progressContainer.style.display = 'none';
                statusDisplay.textContent = `Export erfolgreich (${fileExtension.toUpperCase()}).`;
                statusDisplay.style.color = '#00ffcc';
                video.pause();
                
                if (window.osBus) window.osBus.emit('log', { msg: `Video Cut in ${fileExtension} generiert.` });
            };

            video.currentTime = startTime;
            await video.play();
            mediaRecorder.start();

            const updateProcess = () => {
                if (!isRecording) return;
                const currentRunTime = video.currentTime - startTime;
                const progress = (currentRunTime / cutDuration) * 100;
                progressBar.style.width = `${Math.min(progress, 100)}%`;

                if (video.currentTime >= endTime) {
                    mediaRecorder.stop();
                    video.pause();
                } else {
                    requestAnimationFrame(updateProcess);
                }
            };
            requestAnimationFrame(updateProcess);

        } catch (error) {
            console.error('[Video Engine Error]', error);
            statusDisplay.textContent = 'Fehler bei der Aufzeichnung (CORS oder Codec-Limitierung).';
            statusDisplay.style.color = '#ff7b72';
            isRecording = false;
            btnExport.disabled = false;
        }
    });
</script>
